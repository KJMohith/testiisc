<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DRISHTI Retina Screening MVP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  </head>
  <body>
    <header class="hero">
      <div>
        <p class="eyebrow">DRISHTI</p>
        <h1>Web-based retinal screening MVP</h1>
        <p class="subtitle">
          Upload a fundus image, run quality checks, and get an AI-assisted glaucoma triage result.
        </p>
      </div>
    </header>

    <main class="layout">
      <section class="card capture-card">
        <h2>1. Capture / Upload</h2>
        <div class="camera-frame">
          <div class="alignment-circle"></div>
          <label for="imageInput" class="upload-label">Choose fundus image</label>
          <input id="imageInput" type="file" accept="image/*" capture="environment" />
          <img id="preview" alt="Preview" class="preview hidden" />
        </div>
        <button id="analyzeBtn" disabled>Analyze image</button>
      </section>

      <section class="card result-card">
        <h2>2. AI Result</h2>
        <div id="trafficLight" class="traffic neutral"></div>
        <p id="resultText">No analysis yet.</p>
        <ul id="metrics" class="metrics"></ul>
      </section>

      <section class="card history-card">
        <h2>3. Scan History</h2>
        <p class="history-hint">Stored locally in this browser for MVP demo purposes.</p>
        <div id="historyList" class="history-list"></div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
